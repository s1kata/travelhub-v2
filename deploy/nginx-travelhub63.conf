# Пример production-конфига: один редирект HTTP → HTTPS, без циклов.
# Подключите в sites-enabled и проверьте: ssl_certificate / ssl_certificate_key.

server {
    listen 80;
    listen [::]:80;
    server_name travelhub63.ru www.travelhub63.ru;
    return 301 https://travelhub63.ru$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name travelhub63.ru;

    # ssl_certificate ...;
    # ssl_certificate_key ...;

    # ВАЖНО: не делать return на http и не редиректить с https на другой хост без необходимости.

    root /var/www/html;
    index index.php index.html;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # CRM (U-ON) для приложения — как в корневом .htaccess: path + исходные query-параметры
    location ^~ /api/crm {
        rewrite ^/api/crm/?$ /backend/api/crm-mobile.php?path=&$args last;
        rewrite ^/api/crm/(.+)$ /backend/api/crm-mobile.php?path=$1&$args last;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_pass unix:/run/php/php-fpm.sock;
    }
}

# Опционально: www → без www на HTTPS (один явный редирект, не цепочка)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.travelhub63.ru;
    return 301 https://travelhub63.ru$request_uri;
}
